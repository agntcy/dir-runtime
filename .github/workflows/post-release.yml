---
name: Post Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  prepare:
    if: startsWith(github.event.release.tag_name, 'v')
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.modules.outputs.modules }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Get modules
        id: modules
        run: |
          # shellcheck disable=SC2016
          echo "modules=$(find . -name go.mod -type f -exec awk '/^module / {print $2}' {} \; | jq -c -R '[.,inputs] | map(sub("^github.com\/agntcy\/dir-runtime\/";""))')" >> "$GITHUB_OUTPUT"

  create-module-tags:
    needs: prepare
    name: Create module tags
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tags: ${{ fromJson(needs.prepare.outputs.modules) }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Create tag
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'refs/tags/${{ matrix.tags }}/${{ github.ref_name }}',
              sha: context.sha
            })
